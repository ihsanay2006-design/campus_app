name: campus_app
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_tts: ^4.2.0
  pdf: ^3.10.4
  printing: ^5.11.0
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/crest_banner.png
    - assets/images/river_banner.png
    - assets/images/home_top_banner.png
    - assets/images/home_bottom_banner.png
    - assets/images/faculty_avatar.png
    - assets/images/certificate_template.jpg
